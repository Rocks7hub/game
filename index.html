<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yguinho Modas - Desafio dos Balões</title>
    <style>
        /* --- ESTILOS GERAIS (Inspirado no Banner) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- LOGO E TÍTULOS --- */
        .header {
            margin-bottom: 30px;
        }

        .logo-box {
            border: 2px solid #d4af37;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .logo-box h2 {
            margin: 0;
            font-size: 24px;
            color: #d4af37;
            font-weight: bold;
        }

        .logo-box p {
            margin: 0;
            font-size: 8px;
            letter-spacing: 1px;
            color: #d4af37;
        }

        h1 {
            font-size: 32px;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .destaque-ouro {
            color: #d4af37;
            font-weight: 900;
            font-size: 42px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            display: block;
            margin-top: -5px;
        }

        .subtitulo {
            font-size: 14px;
            color: #cccccc;
            margin: 20px 0;
            line-height: 1.4;
        }

        /* --- ÁREA DOS BALÕES --- */
        .baloes-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            margin: 40px 0;
            height: 250px;
        }

        .balao-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .balao-wrapper:hover {
            transform: scale(1.05);
        }

        /* O Balão */
        .balao {
            width: 100px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #444444, #111111, #000000);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(255,255,255,0.2);
            animation: flutuar 3s ease-in-out infinite alternate;
        }

        /* Diferença de altura e delay para animação natural */
        .balao-wrapper:nth-child(1) .balao { animation-delay: 0s; }
        .balao-wrapper:nth-child(2) { margin-bottom: 30px; }
        .balao-wrapper:nth-child(2) .balao { animation-delay: 0.5s; }
        .balao-wrapper:nth-child(3) .balao { animation-delay: 1s; }

        .balao::after {
            content: '?';
            color: #d4af37;
            font-size: 40px;
            font-weight: bold;
        }

        /* O lacinho do balão */
        .balao-nó {
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 10px solid #111;
            margin-top: -2px;
            z-index: 2;
        }

        /* Círculo com o Número */
        .numero-circulo {
            width: 40px;
            height: 40px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #d4af37;
            margin-top: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* --- TELA DE RESULTADO (MODAL) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #111111 0%, #222222 100%);
            border: 2px solid #d4af37;
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 80%;
            width: 350px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            animation: abrirModal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .resultado-icone {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .resultado-texto {
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-recomecar {
            background-color: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-recomecar:hover {
            background-color: #d4af37;
            color: #000000;
            box-shadow: 0 0 15px #d4af37;
        }

        /* --- ANIMAÇÕES --- */
        @keyframes flutuar {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @keyframes abrirModal {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Efeito do balão sumindo ao estourar */
        .estourado {
            animation: estourarSom 0.2s forwards !important;
        }

        @keyframes estourarSom {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="logo-box">
                <h2>YW</h2>
                <p>YGUINHO</p>
                <p style="font-size: 5px; letter-spacing: 0px;">MODAS & VARIEDADES</p>
            </div>
            <h1>Desafio dos</h1>
            <span class="destaque-ouro">Balões!</span>
        </div>

        <p class="subtitulo">
            Escolha um número e descubra<br>
            o que a sorte preparou pra você! 👀🎁
        </p>

        <div class="baloes-container">
            
            <div class="balao-wrapper" onclick="cliqueBalao(2, this)">
                <div class="balao"></div>
                <div class="balao-nó"></div>
                <div class="numero-circulo">2</div>
            </div>

            <div class="balao-wrapper" onclick="cliqueBalao(1, this)">
                <div class="balao"></div>
                <div class="balao-nó"></div>
                <div class="numero-circulo">1</div>
            </div>

            <div class="balao-wrapper" onclick="cliqueBalao(3, this)">
                <div class="balao"></div>
                <div class="balao-nó"></div>
                <div class="numero-circulo">3</div>
            </div>

        </div>

    </div>

    <div class="modal" id="modalResultado">
        <div class="modal-content">
            <div class="resultado-icone" id="resultadoIcone">🎈</div>
            <div class="resultado-texto" id="resultadoTexto">Texto do prêmio aqui!</div>
            <button class="btn-recomecar" onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <script>
        // Configuração das possibilidades de prêmios
        const premios = [
            { tipo: 'ganhou', icone: '🎉', texto: 'Parabéns!<br><strong style="color: #d4af37; font-size: 24px;">Ganhou 15% de Desconto</strong><br>levando um kit! 🛍️' },
            { tipo: 'ganhou', icone: '🔥', texto: 'Sensacional!<br><strong style="color: #d4af37; font-size: 24px;">Ganhou 20% de Desconto</strong><br>levando um kit! 🛍️' },
            { tipo: 'perdeu', icone: '😔', texto: '<strong style="font-size: 22px;">Não foi dessa vez...</strong><br><br>Mas não desanime, tente a sorte novamente amanhã! ✨' }
        ];

        let jogoAtivo = true;

        // Executa assim que a página carrega para verificar se já jogou nas últimas 24h
        window.onload = function() {
            verificarBloqueio();
        };

        function verificarBloqueio() {
            const ultimoJogo = localStorage.getItem('yguinho_ultimo_jogo');
            
            if (ultimoJogo) {
                const agora = new Date().getTime();
                const tempoDecorrido = agora - parseInt(ultimoJogo);
                const vinteQuatroHoras = 24 * 60 * 60 * 1000; // 24 horas em milissegundos

                if (tempoDecorrido < vinteQuatroHoras) {
                    jogoAtivo = false;

                    // Calcula quanto tempo falta
                    const tempoRestante = vinteQuatroHoras - tempoDecorrido;
                    const horasFaltando = Math.floor(tempoRestante / (1000 * 60 * 60));
                    const minutosFaltando = Math.floor((tempoRestante % (1000 * 60 * 60)) / (1000 * 60));

                    // Exibe a mensagem de bloqueio na tela
                    document.getElementById('resultadoIcone').innerHTML = '⏳';
                    document.getElementById('resultadoTexto').innerHTML = `Você já participou do desafio de hoje!<br><br>Sua próxima tentativa estará disponível em:<br><strong style="color: #d4af37; font-size: 20px;">${horasFaltando}h e ${minutosFaltando}min</strong>.`;
                    
                    // Oculta o botão de fechar para forçar a tela de espera
                    document.querySelector('.btn-recomecar').style.display = 'none';
                    document.getElementById('modalResultado').style.display = 'flex';
                    return true;
                }
            }
            
            // Caso não esteja bloqueado, garante que o botão apareça normalmente
            document.querySelector('.btn-recomecar').style.display = 'inline-block';
            return false;
        }

        // Função executada ao clicar em qualquer balão
        function cliqueBalao(numero, elemento) {
            // Se o jogo estiver travado por tempo ou cliques múltiplos
            if (!jogoAtivo || verificarBloqueio()) return;
            
            jogoAtivo = false; 

            // Salva o timestamp atual no localStorage para travar o jogo pelas próximas 24 horas
            const agora = new Date().getTime();
            localStorage.setItem('yguinho_ultimo_jogo', agora);

            // Efeito visual de estourar o balão
            const balaoElemento = elemento.querySelector('.balao');
            balaoElemento.classList.add('estourado');
            
            // Toca o som de Pop nativo do navegador
            efeitoSomEstouro();

            // Sorteio aleatório após a animação de estouro acabar
            setTimeout(() => {
                const indiceSorteado = Math.floor(Math.random() * premios.length);
                const premioSorteado = premios[indiceSorteado];

                // Atualiza e mostra o modal com o resultado final
                document.getElementById('resultadoIcone').innerHTML = premioSorteado.icone;
                document.getElementById('resultadoTexto').innerHTML = premioSorteado.texto;
                document.getElementById('modalResultado').style.display = 'flex';
                
                document.querySelector('.btn-recomecar').innerText = "Entendido";
            }, 300);
        }

        // Apenas fecha a janela do resultado
        function fecharModal() {
            document.getElementById('modalResultado').style.display = 'none';
        }

        // Sintetizador nativo para o som de estouro (dispensa arquivos de áudio .mp3)
        function efeitoSomEstouro() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch (e) {
                console.log("Áudio indisponível.");
            }
        }
    </script>
</body>
</html>
